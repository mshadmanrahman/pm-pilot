schemaVersion: 1
identifier: pm-pilot
displayName: PM Pilot
description: "The PM toolkit for Claude Code. 24 skills, 5 rules, 5 agents, 4 commands for product managers who code."
author: "Shadman Rahman"

components:
  # Skills - PM Core
  - id: ask-company
    description: Enterprise knowledge assistant for org structure and strategy
    skill:
      source: skills/pm-core/ask-company
      destination: ask-company

  - id: deep-context
    description: Cross-channel research across connected systems
    skill:
      source: skills/pm-core/deep-context
      destination: deep-context

  - id: dogfood
    description: Systematically test a web app to find bugs and UX issues
    skill:
      source: skills/pm-core/dogfood
      destination: dogfood

  - id: market-sizing
    description: Calculate TAM, SAM, SOM for market sizing analysis
    skill:
      source: skills/pm-core/market-sizing
      destination: market-sizing

  - id: meeting-prep
    description: Pre-meeting context gathering across all connected systems
    skill:
      source: skills/pm-core/meeting-prep
      destination: meeting-prep

  - id: weekly-status
    description: Auto-generate weekly accomplishment reports
    skill:
      source: skills/pm-core/weekly-status
      destination: weekly-status
  - id: lenny-podcast
    description: PM advisor drawing from 269+ Lenny's Podcast episodes
    skill:
      source: skills/pm-core/lenny-podcast
      destination: lenny-podcast

  - id: prd
    description: Generate PRDs, briefs, one-pagers, and RFCs at variable depth
    skill:
      source: skills/pm-core/prd
      destination: prd

  - id: prioritize
    description: Score and rank features with RICE, ICE, WSJF, MoSCoW, Kano, and more
    skill:
      source: skills/pm-core/prioritize
      destination: prioritize

  - id: synthesize-interviews
    description: Turn raw interviews into themes, pain points, and recommendations
    skill:
      source: skills/pm-core/synthesize-interviews
      destination: synthesize-interviews

  - id: critique
    description: Pressure-test any document for logic, assumptions, and completeness
    skill:
      source: skills/pm-core/critique
      destination: critique

  # Skills - Content
  - id: market-research
    description: Competitive analysis and industry intelligence
    skill:
      source: skills/content/market-research
      destination: market-research

  - id: writing-style
    description: Personal writing voice calibration for all content
    skill:
      source: skills/content/writing-style
      destination: writing-style

  - id: writing-substack
    description: Create engaging Substack posts and notes
    skill:
      source: skills/content/writing-substack
      destination: writing-substack

  # Skills - Dev
  - id: search-first
    description: Research before coding workflow
    skill:
      source: skills/dev/search-first
      destination: search-first

  - id: security-review
    description: Security vulnerability detection and remediation
    skill:
      source: skills/dev/security-review
      destination: security-review

  - id: tdd-workflow
    description: Test-driven development with write-tests-first methodology
    skill:
      source: skills/dev/tdd-workflow
      destination: tdd-workflow

  - id: verification-loop
    description: Comprehensive verification system for sessions
    skill:
      source: skills/dev/verification-loop
      destination: verification-loop

  # Skills - Productivity
  - id: handoff-doc
    description: Portable handoff documents for session continuity
    skill:
      source: skills/productivity/handoff-doc
      destination: handoff-doc

  - id: manifest-reader
    description: Read and summarize sub-agent manifest files
    skill:
      source: skills/productivity/manifest-reader
      destination: manifest-reader

  - id: meta-observer
    description: Log user corrections and emerging patterns
    skill:
      source: skills/productivity/meta-observer
      destination: meta-observer

  - id: orchestrator
    description: Wave-based parallel agent execution
    skill:
      source: skills/productivity/orchestrator
      destination: orchestrator

  - id: session-init
    description: Lightweight session initialization from manifests and handoffs
    skill:
      source: skills/productivity/session-init
      destination: session-init

  - id: strategic-compact
    description: Context compaction at logical intervals
    skill:
      source: skills/productivity/strategic-compact
      destination: strategic-compact

  # Agents
  - id: build-error-resolver
    description: Fix build and type errors with minimal diffs
    agent:
      source: agents/build-error-resolver.md
      destination: build-error-resolver.md

  - id: code-reviewer
    description: Code review for quality, security, and maintainability
    agent:
      source: agents/code-reviewer.md
      destination: code-reviewer.md

  - id: file-analyzer
    description: Analyze and summarize file contents
    agent:
      source: agents/file-analyzer.md
      destination: file-analyzer.md

  - id: planner
    description: Implementation planning for complex features
    agent:
      source: agents/planner.md
      destination: planner.md

  - id: tdd-guide
    description: Test-driven development enforcement agent
    agent:
      source: agents/tdd-guide.md
      destination: tdd-guide.md

  # Commands
  - id: code-review-cmd
    description: Run code review on recent changes
    command:
      source: commands/code-review.md
      destination: code-review.md

  - id: plan-cmd
    description: Create implementation plan before coding
    command:
      source: commands/plan.md
      destination: plan.md

  - id: tdd-cmd
    description: Enforce TDD workflow
    command:
      source: commands/tdd.md
      destination: tdd.md

  - id: verify-cmd
    description: Verify implementation works end-to-end
    command:
      source: commands/verify.md
      destination: verify.md
